<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/landing_page/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <header class="glass-header">
        <div class="logo">M.R.<span class="accent">M.S.</span></div>
        <div class="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <nav class="nav-bar">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about/">About</a></li>
                <li><a href="{% url 'login' %}">Log-in</a></li>
                <li><a href="{% url 'register' %}" class="btn-outline active">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container" style="padding-top: 140px;">
        <div class="glass-card auth-card wide fade-up">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Fill in the details to join our community</p>
            </div>
            
            <form action="" method="post">
                {% csrf_token %}
                
                <div class="row-grid">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="glass-input" name="first_name" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="glass-input" name="last_name" placeholder="Doe" required>
                    </div>
                </div>
            
                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <div class="custom-radio-group">
                        <label class="custom-radio" for="gender_male">
                            <input type="radio" name="gender" id="gender_male" value="MALE" checked>
                            Male
                        </label>
                        <label class="custom-radio" for="gender_female">
                            <input type="radio" name="gender" id="gender_female" value="FEMALE">
                            Female
                        </label>
                    </div>
                </div>

                <div class="row-grid">
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="number" class="glass-input" name="phone_number" placeholder="9876543210" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="glass-input" name="email" placeholder="john@example.com" required>
                    </div>
                </div>
            
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="glass-input" name="password" placeholder="••••••••" required>
                </div>
            
                <div class="form-group">
                    <label class="form-label">Address</label>
                    <textarea class="glass-input" name="address" rows="2" placeholder="Your full local address..." style="resize: vertical;"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Select Area</label>
                    <select class="glass-input" name="area">
                        {% for area in areas %}
                            <option value="{{ area.area_id }}" {% if area.area_name == 'Thaltej' %}selected{% endif %}>{{ area.area_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <button type="submit" class="btn-primary pulse" style="width: 100%; justify-content: center; margin-top: 30px;">
                    Create Account <i class="fas fa-user-plus"></i>
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 25px; font-size: 0.95rem;">
                <p style="color: var(--text-muted);">Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 600;">Login here</a></p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="auth-alert {% if 'success' in message.tags %}success{% else %}error{% endif %} fade-up">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
        </div>
    </main>

    <script>
        const hamburger = document.querySelector(".hamburger");
        const navBar = document.querySelector(".nav-bar");
        const header = document.querySelector('.glass-header');

        hamburger.onclick = function () {
            navBar.classList.toggle("active");
            hamburger.classList.toggle("active");
        }

        window.addEventListener('scroll', function () {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
