<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/landing_page/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <header class="glass-header">
        <div class="logo">M.R.<span class="accent">M.S.</span></div>
        <div class="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <nav class="nav-bar">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about/">About</a></li>
                <li><a href="{% url 'login' %}" class="active">Log-in</a></li>
                <li><a href="{% url 'register' %}" class="btn-outline">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="glass-card auth-card fade-up">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your account</p>
            </div>
            
            <form role="form" action="" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input class="glass-input" placeholder="john@example.com" id="email" name="email" type="email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="glass-input" id="password" name="password" placeholder="••••••••" type="password" required>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 30px;">
                    Sign In <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 25px; font-size: 0.95rem;">
                <p style="color: var(--text-muted);">Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 600;">Register here</a></p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="auth-alert {% if 'success' in message.tags %}success{% else %}error{% endif %} fade-up">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
        </div>
    </main>

    <script>
        const hamburger = document.querySelector(".hamburger");
        const navBar = document.querySelector(".nav-bar");
        const header = document.querySelector('.glass-header');

        hamburger.onclick = function () {
            navBar.classList.toggle("active");
            hamburger.classList.toggle("active");
        }

        window.addEventListener('scroll', function () {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
